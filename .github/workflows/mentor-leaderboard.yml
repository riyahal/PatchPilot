name: Mentor Leaderboard

on:
  pull_request_target:
    types:
      - closed

jobs:
  update_leaderboard:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write # To commit the updated database
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update and Post Mentor Leaderboard
        id: post-comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'mentors.json';
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // 1. Fetch mentors/reviewers for this PR
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
            });
            const prReviewers = new Set(reviews.map(review => review.user.login));
            // 2. Load current stats
            if (!fs.existsSync(path)) {
              console.log(`'${path}' not found. Skipping mentor thank you. A mentor file must exist.`);
              return;
            }
            const mentors = JSON.parse(fs.readFileSync(path, 'utf8'));
            // 3. Find which mentors reviewed this PR
            const mentorsWhoReviewed = [];
            for (const reviewer of prReviewers) {
              if (mentors.includes(reviewer)) {
                mentorsWhoReviewed.push(`@${reviewer}`);
              }
            }
            if (mentorsWhoReviewed.length === 0) {
              console.log("No mentors reviewed this PR. Skipping comment.");
              return;
            }
            const commentBody = `✨ Thank you to our mentor(s) ${mentorsWhoReviewed.join(', ')} for reviewing this PR! ✨\n\nYour contribution is tracked on the main Mentor Leaderboard.`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: commentBody,
            });

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install httpx aiosqlite

      - name: Incrementally update mentor stats in DB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python backend/scripts/update_mentor_stats.py

      - name: Commit updated database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(db): update mentor leaderboard stats"
          file_pattern: "backend/patchpilot.db"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"